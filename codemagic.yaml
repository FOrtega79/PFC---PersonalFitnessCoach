workflows:
  capacitor-ios-workflow:
    name: Capacitor iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync
      - name: Build iOS App (Simulator)
        script: |
          cd ios/App
          xcodebuild build -project App.xcodeproj -scheme App -sdk iphonesimulator -configuration Debug CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/App/build/Build/Products/Debug-iphonesimulator/*.app
